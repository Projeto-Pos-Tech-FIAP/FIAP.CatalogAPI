version: "3.8"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: catalog-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "PosTech@123"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  mongodb:
    image: mongo:7
    container_name: catalog-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: "PosTech@123"
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: catalog-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ─── Kafka ───────────────────────────────────────────────────────────────────
  # Zookeeper: coordenador de cluster necessário para o Kafka (modo KRaft não usado aqui)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: catalog-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: catalog-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"         # acesso externo (host machine / aplicação local)
      - "9093:9093"         # acesso interno entre containers
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # LISTENERS: como o broker "escuta" conexões
      # PLAINTEXT      → porta interna 9093 (outros containers)
      # PLAINTEXT_HOST → porta externa 9092 (host machine)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9093,PLAINTEXT_HOST://localhost:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data

  # Kafka UI – painel visual para inspecionar tópicos e mensagens
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: catalog-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093

volumes:
  sqlserver_data:
  mongo_data:
  redis_data:
  kafka_data:
